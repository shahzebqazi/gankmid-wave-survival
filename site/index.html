<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GankMid — Dev</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d12;
      --surface: #111620;
      --card: #171d2a;
      --border: #252e3f;
      --text: #e2e8f3;
      --muted: #7d8a9e;
      --accent: #64a8ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.55 "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #9ac5ff; }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
      flex: 1;
    }
    h1 { font-size: 32px; margin-bottom: 6px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--muted); font-size: 15px; margin-bottom: 40px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 16px; }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
      text-decoration: none;
      color: inherit;
    }
    .game-card:hover { border-color: rgba(100,168,255,0.4); transform: translateY(-2px); }
    .game-thumb {
      height: 180px;
      background: linear-gradient(135deg, #1a2235, #111620);
      display: grid;
      place-items: center;
      border-bottom: 1px solid var(--border);
      font-size: 56px;
    }
    .game-body { padding: 18px; }
    .game-body h3 { font-size: 18px; margin-bottom: 6px; }
    .game-body p { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .game-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      background: rgba(100,168,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(100,168,255,0.25);
    }
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Gank<span>Mid</span> Dev</h1>
    <p class="sub">Development builds and design documentation.</p>

    <h2>Games</h2>
    <div class="games">
      <a href="games/wave-survival/" class="game-card">
        <div class="game-thumb">💀</div>
        <div class="game-body">
          <h3>Wave Survival</h3>
          <p>Dungeon prototype — Zombies-style wave survival with KayKit skeletons, greybox arenas, and escalating pressure. Design docs, asset galleries, and mockups.</p>
        </div>
        <div class="game-footer">
          <span>Godot 4.6 · 3 maps · 6 characters</span>
          <span class="tag">In Development</span>
        </div>
      </a>
    </div>
  </main>
  <footer class="footer">GankMid.co</footer>
</body>
</html>
